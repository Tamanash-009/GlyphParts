<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GLYPHPARTS — The Complete Nothing & CMF Spare Parts Archive</title>
    
    <!-- PWA & Mobile Web Apps -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAFAFA" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
    <meta name="application-name" content="GlyphParts" />
    <meta name="apple-mobile-web-app-title" content="GlyphParts" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text font-size=%2280%22 y=%22.9em%22>📞</text></svg>" />

    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var isDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#000000';
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#000000');
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#FAFAFA';
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#FAFAFA');
          }
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Official lookup engine for Nothing and CMF smartphone spare parts prices: displays, screens, batteries, back glass covers, and motherboards. Not e-commerce." />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GLYPHPARTS — The Complete Nothing & CMF Spare Parts Archive" />
    <meta property="og:description" content="Look up verified original Nothing spare parts replacement prices model-wise and component-wise. Clean, dot-matrix editorial index." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1200&q=80" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="GLYPHPARTS — The Complete Nothing & CMF Spare Parts Archive" />
    <meta property="twitter:description" content="Look up verified original Nothing spare parts replacement prices. Dot-matrix editorial index." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1200&q=80" />
    
    <!-- Google Fonts: Inter and Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22black%22>●</text></svg>">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Schema.org Markup -->

      "@context": "https://schema.org",

      "description": "Comprehensive index and price lookup for independent repairing of Nothing and CMF smartphones.",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "All"
    }
    </script>
  </body>
</html>
